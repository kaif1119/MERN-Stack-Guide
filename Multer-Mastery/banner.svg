<svg viewBox="0 0 900 310" xmlns="http://www.w3.org/2000/svg" width="900" height="310">
  <defs>
    <!-- Glow filters -->
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#060D1F"/>
      <stop offset="50%"  stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#050C18"/>
    </linearGradient>

    <!-- Multer title gradient: electric blue ‚Üí violet ‚Üí orange (upload feel) -->
    <linearGradient id="multerGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00CFFF"/>
      <stop offset="35%"  stop-color="#7B2FFF"/>
      <stop offset="70%"  stop-color="#FF5F1F"/>
      <stop offset="100%" stop-color="#FF3CAC"/>
    </linearGradient>

    <!-- MASTERY subtitle gradient -->
    <linearGradient id="masteryGrad" x1="0" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FF5F1F"/>
      <stop offset="50%"  stop-color="#FF1D6B"/>
      <stop offset="100%" stop-color="#FF3CAC"/>
    </linearGradient>

    <!-- Divider line gradient -->
    <linearGradient id="divGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00CFFF" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#7B2FFF" stop-opacity="0.9"/>
      <stop offset="75%"  stop-color="#FF5F1F" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF3CAC" stop-opacity="0"/>
    </linearGradient>

    <!-- Sub-text gradient -->
    <linearGradient id="subGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00CFFF"/>
      <stop offset="50%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FF5F1F"/>
    </linearGradient>

    <!-- Ambient orb gradient (decorative glow blobs) -->
    <radialGradient id="orbBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00CFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00CFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF5F1F" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF5F1F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7B2FFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B2FFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="310" fill="url(#bgGrad)" rx="14"/>

  <!-- Ambient orbs -->
  <ellipse cx="130" cy="155" rx="180" ry="120" fill="url(#orbBlue)"/>
  <ellipse cx="770" cy="155" rx="180" ry="120" fill="url(#orbOrange)"/>
  <ellipse cx="450" cy="155" rx="160" ry="100" fill="url(#orbViolet)"/>

  <!-- Border rings -->
  <rect x="1"   y="1"   width="898" height="308" fill="none" stroke="#00CFFF" stroke-width="1"   rx="13" opacity="0.22"/>
  <rect x="3.5" y="3.5" width="893" height="303" fill="none" stroke="#7B2FFF" stroke-width="0.5" rx="11" opacity="0.14"/>

  <!-- Corner dots -->
  <circle cx="18"  cy="18"  r="3.5" fill="#00CFFF" opacity="0.75"/>
  <circle cx="882" cy="18"  r="3.5" fill="#FF3CAC" opacity="0.75"/>
  <circle cx="18"  cy="292" r="3.5" fill="#FF5F1F" opacity="0.75"/>
  <circle cx="882" cy="292" r="3.5" fill="#7B2FFF" opacity="0.75"/>

  <!-- Upload arrow icon (decorative, left side) -->
  <g opacity="0.18" transform="translate(820, 30)">
    <rect x="18" y="28" width="24" height="16" rx="3" fill="#00CFFF"/>
    <polygon points="30,4 18,20 24,20 24,28 36,28 36,20 42,20" fill="#00CFFF"/>
  </g>
  <g opacity="0.13" transform="translate(38, 28)">
    <rect x="18" y="28" width="24" height="16" rx="3" fill="#FF5F1F"/>
    <polygon points="30,4 18,20 24,20 24,28 36,28 36,20 42,20" fill="#FF5F1F"/>
  </g>

