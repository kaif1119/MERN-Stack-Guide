<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="50%" stop-color="#0B2447"/>
      <stop offset="100%" stop-color="#081A2C"/>
    </linearGradient>

    <!-- Glow -->
    <radialGradient id="glow1">
      <stop offset="0%" stop-color="#00FFB3" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#00FFB3" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2">
      <stop offset="0%" stop-color="#61DAFB" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#61DAFB" stop-opacity="0"/>
    </radialGradient>

    <!-- Title Gradient -->
    <linearGradient id="title" x1="0" x2="1">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="50%" stop-color="#61DAFB"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- Card -->
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A2336"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".35"/>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Glows -->
  <circle cx="180" cy="120" r="180" fill="url(#glow1)"/>
  <circle cx="1050" cy="540" r="220" fill="url(#glow2)"/>

  <!-- Dots -->
  <g opacity=".15">
    <circle cx="150" cy="80" r="2" fill="white"/>
    <circle cx="250" cy="170" r="2" fill="white"/>
    <circle cx="980" cy="120" r="2" fill="white"/>
    <circle cx="1160" cy="240" r="2" fill="white"/>
    <circle cx="1040" cy="520" r="2" fill="white"/>
    <circle cx="330" cy="510" r="2" fill="white"/>
  </g>

  <!-- Laptop -->
  <g filter="url(#shadow)">
    <rect x="80" y="170" rx="22" ry="22" width="360" height="220" fill="#0D1728" stroke="#2F80ED" stroke-width="3"/>

    <rect x="105" y="195" width="310" height="165" rx="10" fill="#101C33"/>

    <!-- Code -->
    <rect x="125" y="220" width="140" height="8" rx="4" fill="#00E676"/>
    <rect x="125" y="245" width="200" height="8" rx="4" fill="#61DAFB"/>
    <rect x="125" y="270" width="170" height="8" rx="4" fill="#8B5CF6"/>
    <rect x="125" y="295" width="220" height="8" rx="4" fill="#FFD54F"/>
    <rect x="125" y="320" width="120" height="8" rx="4" fill="#00E676"/>

    <rect x="55" y="392" width="410" height="20" rx="8" fill="#28384D"/>
  </g>

  <!-- Rocket -->
  <g transform="translate(410 145)">
    <path d="M30 0C60 25 75 70 75 120L45 105L15 120C15 70 30 25 60 0H30Z"
          fill="#FF5F45"/>
    <circle cx="45" cy="48" r="10" fill="#C8F7FF"/>
    <path d="M35 118L15 160L45 145L75 160L55 118Z" fill="#FFC400"/>
  </g>

  <!-- Title -->
  <text x="560"
        y="250"
        font-size="82"
        font-family="Segoe UI, Arial"
        font-weight="900"
        fill="url(#title)">
        MERN
  </text>

  <text x="560"
        y="330"
        font-size="56"
        font-family="Segoe UI, Arial"
        font-weight="700"
        fill="#FFFFFF">
        Stack Guide
  </text>

  <text x="560"
        y="380"
        font-size="24"
        font-family="Segoe UI, Arial"
        fill="#AFC5DA">
        Learn • Build • Deploy • Master
  </text>

  <!-- Right Cards -->
  <g>

    <rect x="850" y="120" width="330" height="62" rx="18" fill="url(#card)" stroke="#00E676"/>
    <text x="880" y="160" font-size="28" fill="#00E676">🍃 MongoDB</text>

    <rect x="850" y="205" width="330" height="62" rx="18" fill="url(#card)" stroke="#AAAAAA"/>
    <text x="880" y="245" font-size="28" fill="#FFFFFF">⚡ Express.js</text>

    <rect x="850" y="290" width="330" height="62" rx="18" fill="url(#card)" stroke="#61DAFB"/>
    <text x="880" y="330" font-size="28" fill="#61DAFB">⚛ React.js</text>

    <rect x="850" y="375" width="330" height="62" rx="18" fill="url(#card)" stroke="#68D391"/>
    <text x="880" y="415" font-size="28" fill="#68D391">🟢 Node.js</text>

  </g>

  <!-- Bottom Badges -->
  <g>

    <rect x="180" y="520" width="150" height="46" rx="23" fill="#00E676"/>
    <text x="210" y="550" font-size="22" fill="#07111F" font-weight="700">JavaScript</text>

    <rect x="360" y="520" width="110" height="46" rx="23" fill="#61DAFB"/>
    <text x="390" y="550" font-size="22" fill="#07111F" font-weight="700">REST API</text>

    <rect x="500" y="520" width="150" height="46" rx="23" fill="#8B5CF6"/>
    <text x="535" y="550" font-size="22" fill="white" font-weight="700">Projects</text>

    <rect x="680" y="520" width="180" height="46" rx="23" fill="#F59E0B"/>
    <text x="720" y="550" font-size="22" fill="#07111F" font-weight="700">Interview</text>

  </g>

  <!-- Footer -->
  <text x="640"
        y="610"
        text-anchor="middle"
        font-size="18"
        fill="#6D87A8">
        github.com/yourusername • Complete MERN Stack Learning Repository
  </text>

</svg>
